version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: satsid
      POSTGRES_USER: satsid
      POSTGRES_PASSWORD: satsid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satsid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
